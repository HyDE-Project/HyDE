layerrule2 = blur,rofi
layerrule2 = ignorezero,rofi
layerrule2 = blur,notifications
layerrule2 = ignorezero,notifications
layerrule2 = blur,swaync-notification-window
layerrule2 = ignorezero,swaync-notification-window
layerrule2 = blur,swaync-control-center
layerrule2 = ignorezero,swaync-control-center
layerrule2 = blur,logout_dialog
layerrule2 = ignorezero,logout_dialog
layerrule2 = blur,waybar
layerrule2 = ignorezero,waybar

