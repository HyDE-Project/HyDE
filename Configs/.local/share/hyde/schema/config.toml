[properties."cava.stdout".properties.bar_array.items]
    type = "string"

[properties."cava.hyprlock"]
    description = "'cava.sh hyprlock' configuration."
    type        = "object"

[properties."cava.hyprlock".properties.bar]
    default     = "▁▂▃▄▅▆▇█"
