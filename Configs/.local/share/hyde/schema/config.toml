    type        = "integer"

[properties."cava.waybar".properties.standby]
    default     = "🎶"
    description = "Standby character for cava."
    type        = "string"

[properties."cava.waybar".properties.bar_array]
    default     = [ "◜", "◝", "◞", "◟", "◠", "◡", "◢", "◣" ]
