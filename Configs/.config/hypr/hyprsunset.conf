# See hyprsunset documentation: https://wiki.hypr.land/Hypr-Ecosystem/hyprsunset/
# Max-gamma sets the upper limit for color adjustments
max-gamma = 150

# Day profile: Returns screen to native colors (6:00 AM)
profile {
    time = 06:00
    identity = true
}

# Night Profile: Applies warmer filter for evening (9:00 PM)
profile {
    time = 21:00
    temperature = 4500
    gamma = 0.85
}